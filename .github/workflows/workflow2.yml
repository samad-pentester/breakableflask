# Name of the overall workflow, shown in the GitHub Actions UI
name: Python Build and Test with SAST

# When to trigger this workflow
#  on:
    push:
      branches: [ master ]        # Run on any push to the master branch
    pull_request:
      branches: [ master ]        # Run on any PR targeting the master branch

# The workflow has two jobs (stages): build and test
jobs:
  # -------------------------
  # Job 1: BUILD STAGE
  # -------------------------
  build:
    runs-on: ubuntu-latest      # Use GitHub-hosted Ubuntu runner

    steps:
      # Step 1: Get the repository code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4   # Official GitHub Action to clone your repo

      # Step 2: Install a specific Python version on the runner
      - name: Set up Python
        uses: actions/setup-python@v5   # Official Action to set up Python
        with:
          python-version: '3.11'        # Use Python 3.11 (adjust if app needs another)

      # Step 3: Install application dependencies
      - name: Install dependencies
        run: |
          # Upgrade pip to the latest version
          python -m pip install --upgrade pip
          # If requirements.txt exists, install listed packages
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: compile all python files
      - name: Basic build check
        run: |
          # Simple “build” sanity: compile all Python files
          python -m compileall .

  # -------------------------
  # Job 2: TEST STAGE
  # -------------------------
  test:
    runs-on: ubuntu-latest      # Use GitHub-hosted Ubuntu runner for tests
    needs: build                # Do not run tests unless the build job succeeded

    steps:
      # Step 1: Get the same repository code into this test runner
      - name: Checkout repository
        uses: actions/checkout@v4   # Each job needs its own checkout

      # Step 2: Install the same Python version for consistency
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'    # Keep test environment aligned with build

      # Step 3: Install dependencies again for this job
      - name: Install dependencies
        run: |
          # Upgrade pip
          python -m pip install --upgrade pip
          # Install app dependencies if requirements.txt is present
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Here is Bandit now, inside the TEST stage
      - name: Run Bandit SAST (test stage)
        run: |
          pip install bandit
          bandit -r . -f html -o bandit-report.html  || true  # f for output file format & o for output file name
      
      # here bandit will save all artifacts 
      - name: Upload Bandit report artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.html
      
      # --- SCA + SBOM: Syft + Grype (HTML reports) ---

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM with Syft (SPDX JSON)
        run: |
          # Generate SBOM for the current repo directory in SPDX JSON format
          syft dir:. -o spdx-json > sbom.json

      - name: Install sbom-report (HTML SBOM renderer)
        run: |
          npm install -g @amberfly/sbom-report

      - name: Generate SBOM HTML report
        run: |
          # Convert SBOM JSON into a self-contained HTML report
          sbom-report sbom.json -o sbom-report.html

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Download Grype HTML template
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/templates/html.tmpl \
            -o grype-html.tmpl

      - name: Scan SBOM with Grype and produce HTML
        run: |
          # Scan the SBOM for vulnerabilities and render HTML via template
          grype sbom:sbom.json -o template -t grype-html.tmpl > grype-report.html || true

      - name: Upload SBOM and SCA HTML reports
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-sca-html-reports
          path: |
            sbom-report.html
            grype-report.html