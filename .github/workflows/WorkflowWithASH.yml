# Name of the overall workflow, shown in the GitHub Actions UI
name: Python Build and Test with ASH

# When to trigger this workflow
on:
    push:
      branches: [ master ]        # Run on any push to the master branch
    pull_request:
      branches: [ master ]        # Run on any PR targeting the master branch

# The workflow has two jobs (stages): build and test
jobs:
  # -------------------------
  # Job 1: BUILD STAGE
  # -------------------------
  build:
    runs-on: ubuntu-latest      # Use GitHub-hosted Ubuntu runner

    steps:
      # Step 1: Get the repository code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4   # Official GitHub Action to clone your repo

      # Step 2: Install a specific Python version on the runner
      - name: Set up Python
        uses: actions/setup-python@v5   # Official Action to set up Python
        with:
          python-version: '3.11'        # Use Python 3.11 (adjust if app needs another)

      # Step 3: Install application dependencies
      - name: Install dependencies
        run: |
          # Upgrade pip to the latest version
          python -m pip install --upgrade pip
          # If requirements.txt exists, install listed packages
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: compile all python files
      - name: Basic build check
        run: |
          # Simple “build” sanity: compile all Python files
          python -m compileall .

  # -------------------------
  # Job 2: TEST STAGE (ASH security scan in container mode)
  # -------------------------
  test:
    runs-on: ubuntu-latest              # Use GitHub-hosted Ubuntu runner
    needs: build                        # Only run ASH if the build job succeeded

    steps:
      # Step 1: Checkout the vulnerable application code
      - name: Checkout repository
        uses: actions/checkout@v4       # Each job needs its own checkout

      # Step 2: Build a local ASH container image from the cloned repo
      # This image will contain the ASH CLI and all its dependencies.
      - name: Build ASH Docker image
        run: |
          # Clone the ASH repository which contains the Dockerfile
          git clone https://github.com/awslabs/automated-security-helper.git
          cd automated-security-helper
          # Build a local Docker image named 'automated-security-helper:non-root'
          # using the ASH Dockerfile in that repo.
          docker build -t automated-security-helper:non-root .

      # Step 3: Prepare an output directory on the GitHub runner
      - name: Prepare ASH output directory
        run: |
          # Create host-side directory where ASH will write its results
          mkdir -p .ash/ash_output

      # Step 4: Run ASH inside the Docker container
      - name: Run ASH security scan (container mode)
        run: |
          # Run the ASH container image and mount:
          # - The application repo into /workspace
          # - The output directory into /ash_output
          # Then execute 'ash' inside the container against /workspace.
          docker run --rm \
            --user root \ 
            -v "$(pwd)":/workspace \
            -v "$(pwd)/.ash/ash_output":/ash_output \
            automated-security-helper:non-root \
            ash --source-dir /workspace --output-dir /ash_output || true

      # Step 5: Upload ASH HTML report as a GitHub Actions artifact
      - name: Upload ASH HTML report
        uses: actions/upload-artifact@v4
        with:
          name: ash-html-report
          path: .ash/ash_output/reports/ash.html    # ASH writes HTML summary here inside /ash_output  